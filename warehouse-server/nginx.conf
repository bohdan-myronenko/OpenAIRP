# nginx configuration for warehouse file server
# Serves static files from /app/warehouse

server {
    listen 8080;
    server_name _;

    # Root directory for file serving
    root /app/warehouse;
    
    # Enable directory listing (optional, can be disabled for security)
    autoindex off;
    
    # Security headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Image files with caching
    location ~* \.(jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        try_files $uri =404;
    }
    
    # All other files
    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        try_files $uri =404;
    }
    
    # Health check endpoint
    location = /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
